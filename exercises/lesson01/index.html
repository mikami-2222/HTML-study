<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML基礎レッスン</title>
  </head>
  <body>
    <!-- Step 1: 見出しを書いてみよう -->
    <h1>自己紹介ページ</h1>

    <!-- Step 2: ここに <h2> と <p> を追加しよう -->
      <div>
    <h2>はじめまして</h2>
    <p>私の名前はがふです。web制作の勉強をしています。</p>
    <p>趣味はVRChatでだらだらすることです。</p>
      </div>
      
      <div>
    <h2>好きな食べ物</h2>
    <p>スイカバーが一番好きです。</p>
      </div>
    <!-- Step 3: ここに <ul> または <ol> のリストを追加しよう -->
      <div>
    <h2>好きなものリスト</h2>
    <ol>
      <li>アイス</li>
      <li>VRChat</li>
      <li>改変</li>
    </ol>
      </div>
    <!-- Step 4: ここに <a> リンクと <img> 画像を追加しよう -->
      <div>
    <h2>リンク</h2>
    <p><a href="https://booth.pm/ja">Googleを開く</a></p>

    <h2>画像</h2>
    <img src="https://www.gekiochikun.jp/wp-content/uploads/2023/10/002.jpg="サンプル画像"
    />
      </div>

    <!-- Step 5: <div> でグループ化してみよう -->
  </body>
</html>
